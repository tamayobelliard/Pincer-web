<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Deck — Menú</title>
<meta name="theme-color" content="#0b1e3a">
<meta property="og:title" content="The Deck">
<meta property="og:description" content="Carta digital — Santiago de los Caballeros">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* Colors */
    --color-primary:   #0b1e3a;
    --color-primary-2: #14305b;
    --color-accent:    #c9a961;
    --color-accent-2:  #d9c48a;
    --color-accent-3:  #a8883f;
    --color-bg:        #f6efda;
    --color-bg-2:      #efe7cf;
    --color-surface:   #ffffff;
    --color-text:      #0b1e3a;
    --color-text-soft: rgba(11,30,58,0.65);
    --color-text-mute: rgba(11,30,58,0.45);
    --color-border:    rgba(11,30,58,0.12);
    --color-success:   #2f9e6b;
    --color-danger:    #b54a3a;
    /* Type */
    --font-heading: 'Playfair Display', Georgia, serif;
    --font-body:    'Inter', system-ui, sans-serif;
    --font-serif:   Georgia, 'Times New Roman', serif;
    /* Spacing (4-pt) */
    --sp-xs: 4px; --sp-sm: 8px; --sp-md: 16px; --sp-lg: 24px; --sp-xl: 40px; --sp-2xl: 64px;
    /* Radii */
    --radius-sm: 6px; --radius-md: 12px; --radius-lg: 20px; --radius-xl: 28px; --radius-pill: 999px;
    /* Shadows */
    --shadow-sm: 0 1px 2px rgba(11,30,58,0.08);
    --shadow-md: 0 6px 18px rgba(11,30,58,0.12);
    --shadow-lg: 0 20px 40px rgba(11,30,58,0.25);
    --shadow-cta: 0 10px 26px rgba(11,30,58,0.35);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--color-bg);
    font-family: var(--font-body);
    color: var(--color-text);
    min-height: 100vh;
  }
  body {
    padding-bottom: 120px;  /* space for fixed CTA + FAB */
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  a { color: inherit; text-decoration: none; }
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { scrollbar-width: none; }

  /* ═══════════ HEADER w/ tile pattern + emblem ═══════════ */
  .menu-hdr { position: relative; overflow: hidden; }
  .tile-bg {
    position: absolute; inset: 0; height: 220px; background: var(--color-primary);
  }
  .tile-bg svg { width: 100%; height: 100%; display: block; }
  .top-bar {
    position: relative; z-index: 2;
    display: flex; justify-content: flex-end; padding: 16px 18px 0; color: var(--color-bg);
  }
  .icon-btn {
    width: 36px; height: 36px; border-radius: 50%;
    border: 1px solid rgba(246,239,218,0.35);
    display: flex; align-items: center; justify-content: center; color: var(--color-bg);
    background: transparent;
  }
  .icon-btn:hover { background: rgba(246,239,218,0.1); }
  .emblem-wrap {
    position: relative; padding-top: 20px; z-index: 3;
    display: flex; justify-content: center; margin-bottom: -6px;
  }
  .logo-mark {
    width: 110px; height: 110px; border-radius: 50%;
    background: var(--color-bg); border: 2px solid var(--color-accent);
    padding: 3px; box-shadow: 0 6px 18px rgba(0,0,0,0.25);
  }
  .logo-mark img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: block; }
  .arch-wrap { position: relative; margin-top: -34px; padding-top: 60px; }
  .arch-wrap > svg.arch { position: absolute; top: 0; left: 0; right: 0; width: 100%; display: block; }
  .arch-content { position: relative; z-index: 2; text-align: center; padding-bottom: 14px; }
  .arch-title {
    font-family: var(--font-heading); font-size: 30px; color: var(--color-primary);
    letter-spacing: 1px; font-weight: 500;
  }
  .arch-title em { font-style: italic; font-weight: 500; }
  .arch-hours {
    font-size: 11px; letter-spacing: 2.5px; color: var(--color-primary); opacity: 0.7;
    margin-top: 4px; text-transform: uppercase; font-family: var(--font-serif);
  }

  /* ═══════════ Category tabs ═══════════ */
  .tabs {
    position: sticky; top: 0; z-index: 20; background: var(--color-bg);
    border-bottom: 1px solid var(--color-border);
  }
  .tabs-scroll { display: flex; gap: 6px; overflow-x: auto; padding: 12px 16px; }
  .tab {
    flex-shrink: 0; padding: 9px 16px; border-radius: var(--radius-pill);
    border: 1px solid var(--color-border); background: transparent; color: var(--color-primary);
    font-family: var(--font-serif); font-size: 12px; letter-spacing: 2px;
    text-transform: uppercase; white-space: nowrap; transition: all 0.15s;
  }
  .tab:hover { background: rgba(201,169,97,0.1); }
  .tab.active { background: var(--color-primary); color: var(--color-bg); border-color: var(--color-primary); }

  /* ═══════════ Section header ═══════════ */
  .sec-hdr { padding: 24px 18px 12px; text-align: center; }
  .sec-group {
    font-size: 10px; letter-spacing: 3px; color: var(--color-accent-3);
    text-transform: uppercase; margin-bottom: 4px; font-family: var(--font-serif);
  }
  .sec-title {
    font-family: var(--font-heading); font-size: 26px; color: var(--color-primary);
    letter-spacing: 4px; text-transform: uppercase;
  }
  .sec-orn {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    margin-top: 8px; color: var(--color-accent-3);
  }
  .sec-orn span.line { height: 1px; width: 28px; background: currentColor; }
  .sec-orn svg { width: 8px; height: 8px; }

  /* ═══════════ Item row (the wine-row pattern) ═══════════ */
  .item-list { max-width: 560px; margin: 0 auto; }
  .item-row {
    display: flex; align-items: baseline; gap: 8px; padding: 12px 18px;
    border-bottom: 1px dotted var(--color-border); cursor: pointer;
    transition: background 0.15s;
  }
  .item-row:hover { background: rgba(201,169,97,0.06); }
  .item-main { display: flex; flex-direction: column; gap: 3px; flex: 1; min-width: 0; }
  .item-row-inner { display: flex; align-items: baseline; gap: 8px; }
  .item-name {
    font-family: var(--font-serif); font-size: 15px; color: var(--color-primary);
    font-weight: 500; line-height: 1.3;
  }
  .item-desc {
    font-family: var(--font-body); font-size: 11.5px; color: var(--color-text-soft);
    line-height: 1.35; margin-top: 2px;
  }
  .item-leader { flex: 1; border-bottom: 1px dotted rgba(11,30,58,0.25); margin: 0 4px; transform: translateY(-4px); }
  .item-price {
    font-family: var(--font-serif); font-size: 14.5px; color: var(--color-primary);
    font-weight: 600; white-space: nowrap;
  }
  .item-row[data-sold-out="true"] { opacity: 0.45; }
  .item-row[data-sold-out="true"] .item-name::after {
    content: ' · AGOTADO';
    font-size: 10px; letter-spacing: 1.5px; color: var(--color-danger);
  }

  /* ═══════════ CTA (Ordenar Ahora) ═══════════ */
  .cta-wrap {
    position: fixed; left: 14px; right: 14px; bottom: 18px; z-index: 30;
    max-width: 532px; margin: 0 auto;
  }
  .cta-primary {
    width: 100%; padding: 15px 20px; background: var(--color-primary); color: var(--color-bg);
    border: 1.5px solid var(--color-accent); border-radius: var(--radius-md);
    font-size: 13px; letter-spacing: 2.5px; font-family: var(--font-serif);
    text-transform: uppercase; font-weight: 600;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    box-shadow: var(--shadow-cta);
  }
  .cta-primary:active { transform: translateY(1px); }
  .cta-badge {
    background: var(--color-accent); color: var(--color-primary); border-radius: 999px;
    padding: 3px 10px; font-size: 11px; font-weight: 700; letter-spacing: 0;
  }
  .cta-primary[hidden] { display: none; }

  /* ═══════════ Waiter FAB ═══════════ */
  .fab {
    position: fixed; right: 20px; bottom: 88px; z-index: 40;
    width: 58px; height: 58px; border-radius: 50%;
    background: var(--color-primary); border: 2px solid var(--color-accent);
    color: var(--color-bg); display: flex; align-items: center; justify-content: center;
    box-shadow: var(--shadow-lg);
  }
  .fab:active { transform: scale(0.95); }

  /* ═══════════ Footer ═══════════ */
  .footer { position: relative; margin-top: 30px; overflow: hidden; }
  .footer-bg { position: absolute; inset: 0; background: var(--color-primary); }
  .footer-bg svg { width: 100%; height: 100%; display: block; }
  .footer-content {
    position: relative; z-index: 2; padding: 36px 24px; text-align: center; color: var(--color-bg);
  }
  .footer-title { font-family: var(--font-heading); font-size: 24px; letter-spacing: 2px; }
  .footer-tag { font-size: 10px; letter-spacing: 2px; opacity: 0.7; margin-top: 3px; font-family: var(--font-serif); text-transform: uppercase; }
  .footer-addr { font-size: 12px; opacity: 0.75; margin-top: 16px; font-family: var(--font-serif); line-height: 1.5; }
  .footer-tax { font-size: 10px; letter-spacing: 1px; opacity: 0.55; margin-top: 6px; font-family: var(--font-serif); }
  .footer-powered {
    margin-top: 20px; display: inline-flex; align-items: center; gap: 6px;
    font-size: 9px; letter-spacing: 2px; opacity: 0.55; text-transform: uppercase;
  }

  /* ═══════════ Loading ═══════════ */
  .loading {
    display: flex; align-items: center; justify-content: center;
    padding: 80px 20px; color: var(--color-text-soft);
    font-family: var(--font-serif); font-size: 13px; letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* ═══════════ Item popup modal ═══════════ */
  .modal-backdrop {
    position: fixed; inset: 0; z-index: 80; background: rgba(8,16,32,0.55);
    backdrop-filter: blur(2px); display: none; animation: fadeIn 0.2s ease-out;
  }
  .modal-backdrop.open { display: block; }
  .modal {
    position: fixed; left: 50%; transform: translateX(-50%);
    bottom: 20px; top: auto; width: calc(100% - 28px); max-width: 560px;
    max-height: 90vh; z-index: 81;
    background: var(--color-surface); border-radius: var(--radius-lg);
    border: 1px solid var(--color-border);
    box-shadow: var(--shadow-lg); overflow: hidden;
    display: none; flex-direction: column;
    animation: slideUp 0.25s ease-out;
  }
  .modal.open { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translate(-50%, 100%); } to { transform: translate(-50%, 0); } }

  .modal-hero {
    position: relative; height: 200px; overflow: hidden;
    background: linear-gradient(135deg, #2a1d12 0%, #4a2b1a 100%);
    display: flex; align-items: center; justify-content: center;
  }
  .modal-hero img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .modal-hero-chip {
    position: absolute; top: 14px; left: 14px; z-index: 2;
    background: rgba(246,239,218,0.95); color: var(--color-primary);
    border: 1px solid var(--color-accent);
    padding: 4px 12px; border-radius: var(--radius-pill);
    font-family: var(--font-serif); font-size: 11px; letter-spacing: 2px;
    text-transform: uppercase; font-weight: 600;
  }
  .modal-hero-close {
    position: absolute; top: 14px; right: 14px; z-index: 2;
    width: 34px; height: 34px; border-radius: 50%;
    background: rgba(246,239,218,0.95); color: var(--color-primary);
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--color-border);
  }
  .modal-hero-placeholder {
    width: 56px; height: 56px; border-radius: 50%;
    background: rgba(201,169,97,0.2); border: 1px solid var(--color-accent);
    display: flex; align-items: center; justify-content: center;
    color: var(--color-accent-2);
  }

  .modal-body { padding: 20px 22px; overflow-y: auto; flex: 1; }
  .modal-title {
    font-family: var(--font-heading); font-size: 22px; color: var(--color-primary);
    font-weight: 600; line-height: 1.25; margin-bottom: 6px;
  }
  .modal-price {
    font-family: var(--font-heading); font-size: 20px; color: var(--color-primary);
    font-weight: 600; margin-bottom: 10px;
  }
  .modal-desc {
    font-size: 13.5px; color: var(--color-text-soft); line-height: 1.55;
    margin-bottom: 16px; text-wrap: pretty;
  }

  .modal-notes-label {
    font-family: var(--font-serif); font-size: 11px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--color-accent-3); margin-bottom: 6px;
  }
  .modal-notes {
    width: 100%; min-height: 60px; padding: 10px 12px;
    background: var(--color-bg); border: 1px solid var(--color-border);
    border-radius: var(--radius-md); resize: vertical;
    font-family: var(--font-body); font-size: 13.5px; color: var(--color-text);
    outline: none; transition: border-color 0.15s, box-shadow 0.15s;
  }
  .modal-notes:focus { border-color: var(--color-accent); box-shadow: 0 0 0 3px rgba(201,169,97,0.2); }
  .modal-notes::placeholder { color: rgba(11,30,58,0.4); font-style: italic; }

  .modal-qty-row {
    display: flex; align-items: center; gap: 14px; margin-top: 18px;
  }
  .modal-qty-label {
    font-family: var(--font-serif); font-size: 11px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--color-accent-3);
  }
  .qty {
    display: inline-flex; align-items: center; border: 1px solid var(--color-border);
    border-radius: var(--radius-pill); overflow: hidden;
  }
  .qty button {
    width: 36px; height: 36px; color: var(--color-primary); font-size: 18px;
    transition: background 0.15s;
  }
  .qty button:hover { background: rgba(201,169,97,0.1); }
  .qty button:disabled { opacity: 0.3; cursor: not-allowed; }
  .qty span {
    min-width: 32px; text-align: center; font-family: var(--font-heading);
    font-size: 16px; color: var(--color-primary);
  }

  .modal-actions {
    padding: 14px 20px 18px; display: flex; gap: 10px;
    border-top: 1px solid var(--color-border);
    background: rgba(11,30,58,0.02);
  }
  .btn {
    flex: 1; padding: 13px; border-radius: var(--radius-md);
    font-family: var(--font-serif); font-size: 13px; letter-spacing: 2px;
    text-transform: uppercase; font-weight: 600; transition: all 0.15s;
  }
  .btn-secondary {
    background: transparent; color: var(--color-primary); border: 1px solid var(--color-border);
  }
  .btn-secondary:hover { background: rgba(11,30,58,0.04); }
  .btn-primary {
    background: var(--color-primary); color: var(--color-bg);
    border: 1.5px solid var(--color-accent);
    box-shadow: 0 8px 20px rgba(11,30,58,0.3);
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-primary:active { transform: translateY(1px); }
  .btn-primary .tag {
    background: var(--color-accent); color: var(--color-primary);
    border-radius: 999px; padding: 2px 9px; font-size: 11px; letter-spacing: 0;
  }

  /* ═══════════ Cart panel (slide-up) ═══════════ */
  .cart-panel {
    position: fixed; left: 0; right: 0; bottom: 0; top: 0;
    background: var(--color-bg); z-index: 82; display: none;
    flex-direction: column; overflow: hidden;
    animation: slideUpFull 0.3s ease-out;
  }
  .cart-panel.open { display: flex; }
  @keyframes slideUpFull { from { transform: translateY(100%); } to { transform: translateY(0); } }

  .cart-hdr {
    position: relative; padding: 22px 20px 18px; border-bottom: 1px solid var(--color-border);
    display: flex; align-items: center; gap: 12px;
  }
  .cart-back {
    width: 38px; height: 38px; border-radius: 50%;
    border: 1px solid var(--color-border); color: var(--color-primary);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .cart-title-wrap { flex: 1; min-width: 0; }
  .cart-title {
    font-family: var(--font-heading); font-size: 24px; color: var(--color-primary);
    font-weight: 500; line-height: 1.1;
  }
  .cart-count-label {
    font-size: 10px; letter-spacing: 2.5px; color: var(--color-accent-3);
    text-transform: uppercase; font-family: var(--font-serif); margin-top: 4px;
  }

  .cart-body { flex: 1; overflow-y: auto; padding: 8px 0 20px; }

  .cart-empty {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 80px 40px; text-align: center; color: var(--color-text-soft);
    gap: 14px; min-height: 50vh;
  }
  .cart-empty-icon {
    width: 56px; height: 56px; color: var(--color-accent-3);
    display: flex; align-items: center; justify-content: center;
  }
  .cart-empty-title {
    font-family: var(--font-heading); font-size: 20px; color: var(--color-primary); font-weight: 500;
  }
  .cart-empty-msg {
    font-size: 13.5px; color: var(--color-text-soft); line-height: 1.5;
    max-width: 280px; text-wrap: pretty;
  }

  .cart-item {
    padding: 14px 20px; border-bottom: 1px dotted var(--color-border);
    display: flex; gap: 12px; align-items: flex-start;
  }
  .cart-item-main { flex: 1; min-width: 0; }
  .cart-item-row1 {
    display: flex; justify-content: space-between; align-items: baseline; gap: 8px;
  }
  .cart-item-name {
    font-family: var(--font-serif); font-size: 15px; color: var(--color-primary);
    font-weight: 500; line-height: 1.3;
  }
  .cart-item-price {
    font-family: var(--font-serif); font-size: 14px; color: var(--color-primary);
    font-weight: 600; white-space: nowrap;
  }
  .cart-item-notes {
    font-size: 12px; color: var(--color-text-soft); font-style: italic;
    margin-top: 4px; line-height: 1.4;
  }
  .cart-item-controls {
    display: flex; align-items: center; gap: 12px; margin-top: 10px;
  }
  .cart-qty {
    display: inline-flex; align-items: center; border: 1px solid var(--color-border);
    border-radius: var(--radius-pill); overflow: hidden;
  }
  .cart-qty button {
    width: 30px; height: 30px; color: var(--color-primary); font-size: 15px;
  }
  .cart-qty button:hover { background: rgba(201,169,97,0.1); }
  .cart-qty span {
    min-width: 26px; text-align: center; font-family: var(--font-heading);
    font-size: 14px; color: var(--color-primary);
  }
  .cart-item-remove {
    width: 30px; height: 30px; border-radius: 50%;
    color: var(--color-text-mute);
    display: flex; align-items: center; justify-content: center;
    transition: color 0.15s, background 0.15s;
  }
  .cart-item-remove:hover { color: var(--color-danger); background: rgba(181,74,58,0.08); }

  .cart-totals {
    padding: 16px 20px; border-top: 1px solid var(--color-border);
    background: rgba(11,30,58,0.02);
  }
  .cart-totals-row {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 6px;
  }
  .cart-totals-label {
    font-family: var(--font-serif); font-size: 11px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--color-text-soft);
  }
  .cart-totals-value {
    font-family: var(--font-heading); font-size: 16px; color: var(--color-primary);
    font-weight: 500;
  }
  .cart-totals-row.grand .cart-totals-label { color: var(--color-accent-3); font-size: 12px; }
  .cart-totals-row.grand .cart-totals-value { font-size: 22px; font-weight: 600; }
  .cart-totals-divider {
    height: 1px; background: linear-gradient(90deg, transparent, var(--color-accent), transparent);
    margin: 10px 0;
  }

  .cart-footer {
    padding: 14px 20px 22px; border-top: 1px solid var(--color-border);
    background: var(--color-surface);
  }
  .cart-footer .btn-primary {
    width: 100%; padding: 16px;
  }

  /* ═══════════ Responsive tweaks ═══════════ */
  @media (min-width: 900px) {
    .arch-title { font-size: 36px; }
    .sec-title { font-size: 30px; }
    .item-name { font-size: 16px; }
    .cart-panel { max-width: 560px; left: 50%; transform: translateX(-50%); }
    @keyframes slideUpFull { from { transform: translate(-50%, 100%); } to { transform: translate(-50%, 0); } }
  }
</style>
</head>
<body>

<!-- ═════════════ HEADER ═════════════ -->
<div class="menu-hdr">
  <div class="tile-bg">
    <svg aria-hidden="true"><defs><pattern id="tile-hdr" x="0" y="0" width="64" height="64" patternUnits="userSpaceOnUse">
      <rect width="64" height="64" fill="#0b1e3a"/>
      <g stroke="#c9a961" stroke-width="0.8" fill="none" opacity="0.85">
        <rect x="7.7" y="7.7" width="48.6" height="48.6"/>
        <path d="M 7.7 7.7 L 56.3 56.3"/>
        <path d="M 56.3 7.7 L 7.7 56.3"/>
        <path d="M 32 7.7 L 32 56.3"/>
        <path d="M 7.7 32 L 56.3 32"/>
        <path d="M 32 19.2 L 44.8 32 L 32 44.8 L 19.2 32 Z"/>
        <circle cx="32" cy="32" r="2.6"/>
      </g>
      <circle cx="0" cy="0" r="3.2" fill="#c9a961" opacity="0.7"/>
      <circle cx="64" cy="0" r="3.2" fill="#c9a961" opacity="0.7"/>

<script>
// ══════════════════════════════════════════════════════════════
// THE DECK — Custom Template
// Próximos commits: item popup (4), cart (5), checkout + Azul (6),
// chatbot (7), confirmación + comprobante (8).
// ══════════════════════════════════════════════════════════════

const SLUG = 'thedeck';
const SUPABASE_URL = 'https://tcwujslibopzfyufhjsr.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_ib1XEv6lNe5jYXULeUo6tg_dcO0hRMt';
const WHATSAPP_FALLBACK_PHONE = '18293823549'; // The Deck; cached to localStorage on success

// State — commits 4+ poblan estos.
let restaurantData = null;
let products = [];
let productsByCategory = new Map(); // preserva orden de inserción
let cart = [];
let soldOutSet = new Set();

// ── Helpers ──
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function sbHeaders() {
  return {
    'Content-Type': 'application/json',
    'apikey': SUPABASE_ANON_KEY,
    'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
  };
}

function fmtPrice(n) {
  return 'RD$' + (Number(n) || 0).toLocaleString('en-US');
}

// Para categorías que son claramente de vino, agregamos el kicker "Vinos".
// Simple map hardcoded — si en el futuro queremos extenderlo, moverlo a DB.
const GROUP_MAP = {
  'TINTOS': 'Vinos',
  'BLANCOS': 'Vinos',
  'ROSADOS': 'Vinos',
  'ESPUMANTES': 'Vinos',
  'SANGRÍAS': 'Vinos',
  'MOJITOS': 'Cocteles',
  'MARGARITAS': 'Cocteles',
  'MENÚ DE COCTELES': 'Cocteles',
  'COFFEE CORNER': 'Café y Bebidas',
  'SMOOTHIES': 'Café y Bebidas',
  'DETOX & BOOSTERS': 'Café y Bebidas',
  'PROTEIN BOOST': 'Café y Bebidas',
  'CERVEZAS': 'Café y Bebidas',
  'DESAYUNOS': 'Desayunos',
  'OMELETTE CORNER': 'Desayunos',
  'SANDWICHES': 'Sandwiches y Wraps',
  'PANINIS': 'Sandwiches y Wraps',
  'WRAPS': 'Sandwiches y Wraps',
  'QUESADILLAS Y NACHOS': 'Sandwiches y Wraps',
  'BURRATAS': 'Entradas',
  'PARA PICAR...': 'Entradas',
  'GUARNICIONES ESPECIALES': 'Entradas',
  'ENSALADAS': 'Ensaladas',
  'PASTAS': 'Platos Fuertes',
  'SALMÓN': 'Platos Fuertes',
  'CARNES': 'Platos Fuertes',
  'PLATOS FUERTE': 'Platos Fuertes',
  'ESPECIALIDADES': 'Platos Fuertes',
  'MENÚ DE NIÑOS': 'Menú de Niños',
  'POSTRES': 'Postres',
};

// ── Capitalize category name for display (TINTOS → Tintos) ──
function titleCase(s) {
  return String(s).toLowerCase().replace(/\b\w/g, c => c.toUpperCase()).replace('...', '…');
}

// ══════════════════════════════════════════════════════════════
// Outage fallback: si Supabase no carga, mostrar CTA WhatsApp.
// Pattern portado de menu/index.html commits 4ae8d24 + 2631e31,
// adaptado a design system (navy + gold + Playfair).
// Self-healing: cuando Supabase vuelve, loadAll() renderea normal.
// ══════════════════════════════════════════════════════════════
function renderOutageFallback() {
  let cachedPhone = null;
  try { cachedPhone = localStorage.getItem('pincer_whatsapp_' + SLUG); } catch (e) {}
  const waDigits = (cachedPhone || WHATSAPP_FALLBACK_PHONE || '').replace(/\D/g, '');
  const waCta = waDigits
    ? `<a href="https://wa.me/${waDigits}?text=Hola%2C%20quiero%20hacer%20un%20pedido" style="display:inline-block;background:var(--color-primary);color:var(--color-bg);padding:14px 32px;border-radius:var(--radius-md);border:1.5px solid var(--color-accent);text-decoration:none;font-family:var(--font-serif);font-size:13px;letter-spacing:2.5px;text-transform:uppercase;font-weight:600;box-shadow:var(--shadow-cta);">Pedir por WhatsApp</a>`
    : '';
  document.body.style.background = 'var(--color-bg)';
  document.body.innerHTML = `
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;font-family:var(--font-body);">
      <div style="background:var(--color-surface);border-radius:var(--radius-lg);padding:48px 32px;max-width:440px;width:100%;text-align:center;box-shadow:var(--shadow-lg);border-top:2px solid var(--color-accent);">
        <div style="font-family:var(--font-heading);font-size:28px;color:var(--color-primary);margin-bottom:4px;">The Deck</div>
        <div style="font-size:10px;letter-spacing:3px;color:var(--color-accent-3);text-transform:uppercase;font-family:var(--font-serif);margin-bottom:24px;">Servicio en Línea</div>
        <div style="height:1px;background:linear-gradient(90deg,transparent,var(--color-accent),transparent);margin-bottom:24px;"></div>
        <h2 style="font-family:var(--font-heading);font-size:22px;color:var(--color-primary);margin-bottom:12px;font-weight:500;">Temporalmente fuera de línea</h2>
        <p style="color:var(--color-text-soft);line-height:1.55;margin-bottom:${waDigits ? '24px' : '0'};font-size:14px;">
          Estamos atendiendo un inconveniente técnico. ${waDigits ? 'Mientras tanto, toma tu pedido por WhatsApp:' : 'Por favor intenta de nuevo en unos minutos.'}
        </p>
        ${waCta}
        <p style="color:var(--color-text-mute);font-size:11px;margin-top:32px;font-family:var(--font-serif);letter-spacing:1px;">
          Disculpa las molestias.
        </p>
      </div>
    </div>
  `;
}

// ══════════════════════════════════════════════════════════════
// Loaders
// ══════════════════════════════════════════════════════════════

async function fetchRestaurantData() {
  try {
    const r = await fetch(
      SUPABASE_URL + '/rest/v1/restaurant_users_public?restaurant_slug=eq.' + encodeURIComponent(SLUG) + '&select=display_name,status,hours,phone,address,business_type,logo_url&limit=1',
      { headers: sbHeaders(), signal: AbortSignal.timeout(8000) }
    );
    if (!r.ok) return null;
    const rows = await r.json();
    if (!rows.length) return null;
    if (rows[0].status !== 'active' && rows[0].status !== 'demo') return null;
    // Cache phone for outage fallback on next visit
    try {
      if (rows[0].phone) localStorage.setItem('pincer_whatsapp_' + SLUG, rows[0].phone);
    } catch (e) {}
    return rows[0];
  } catch (e) { return null; }
}

async function fetchProducts() {
  try {
    const r = await fetch(
      SUPABASE_URL + '/rest/v1/products?restaurant_slug=eq.' + encodeURIComponent(SLUG) + '&active=eq.true&order=display_order.asc&select=*',
      { headers: sbHeaders(), signal: AbortSignal.timeout(12000) }
    );
    if (!r.ok) return null;
    return await r.json();
  } catch (e) { return null; }
}

async function fetchSoldOut() {
  try {
    const r = await fetch(
      SUPABASE_URL + '/rest/v1/products?restaurant_slug=eq.' + encodeURIComponent(SLUG) + '&sold_out=eq.true&select=id',
      { headers: sbHeaders(), signal: AbortSignal.timeout(5000) }
    );
    if (!r.ok) return new Set();
    const rows = await r.json();
    return new Set(rows.map(r => r.id));
  } catch (e) { return new Set(); }
}

// ══════════════════════════════════════════════════════════════
// Render
// ══════════════════════════════════════════════════════════════

function groupProducts(items) {
  // Orden de categorías = primer aparición (los products vienen ordenados por display_order).
  const map = new Map();
  for (const item of items) {
    const cat = item.category || 'OTROS';
    if (!map.has(cat)) map.set(cat, []);
    map.get(cat).push(item);
  }
  return map;
}

function renderTabs(categories) {
  const tabs = document.getElementById('tabsScroll');
  const first = categories[0];
  tabs.innerHTML = categories.map((cat, i) => {
    const label = titleCase(cat);
    const active = i === 0 ? ' active' : '';
    return `<button class="tab${active}" data-category="${esc(cat)}">${esc(label)}</button>`;
  }).join('');
}

function renderSections(byCategory) {
  const main = document.getElementById('menuSections');
  const sections = [];
  for (const [cat, items] of byCategory.entries()) {
    const group = GROUP_MAP[cat] || '';
    const label = titleCase(cat);
    const rows = items.map(item => {
      const soldOut = soldOutSet.has(item.id);
      if (soldOut) return ''; // oculta agotados (mismo comportamiento que menu/index.html)
      const desc = item.desc || item.description || '';
      const descHtml = desc ? `<div class="item-desc">${esc(desc)}</div>` : '';
      return `
        <div class="item-row" data-item-id="${esc(item.id)}" data-category="${esc(cat)}">
          <div class="item-main">
            <div class="item-row-inner">
              <span class="item-name">${esc(item.name)}</span>
              <span class="item-leader"></span>
              <span class="item-price">${fmtPrice(item.price)}</span>
            </div>
            ${descHtml}
          </div>
        </div>
      `;
    }).join('');
    // Skip categoría si todas las rows son agotadas
    if (!rows.trim()) continue;
    sections.push(`
      <section data-category="${esc(cat)}">
        <div class="sec-hdr">
          ${group ? `<div class="sec-group">${esc(group)}</div>` : ''}
          <div class="sec-title">${esc(label)}</div>
          <div class="sec-orn">
            <span class="line"></span>
            <svg viewBox="0 0 8 8"><path d="M4 0 L8 4 L4 8 L0 4 Z" fill="currentColor"/></svg>
            <span class="line"></span>
          </div>
        </div>
        <div class="item-list">${rows}</div>
      </section>
    `);
  }
  main.innerHTML = sections.join('');
}

function applyRestaurantBranding(data) {
  if (data.display_name) {
    document.title = data.display_name + ' — Menú';
  }
  if (data.hours) {
    document.getElementById('hoursLabel').textContent = data.hours;
  }
  if (data.logo_url) {
    document.getElementById('logoImg').src = data.logo_url;
  }
  if (data.business_type) {
    document.getElementById('footerTag').textContent = data.business_type;
  }
  if (data.address) {
    document.getElementById('footerAddr').innerHTML = esc(data.address);
  }
}

// ══════════════════════════════════════════════════════════════
// Init
// ══════════════════════════════════════════════════════════════

async function init() {
  const [resData, prodData, soldOut] = await Promise.all([
    fetchRestaurantData(),
    fetchProducts(),
    fetchSoldOut(),
  ]);

  if (!resData || !prodData) {
    renderOutageFallback();
    return;
  }

  restaurantData = resData;
  products = prodData;
  soldOutSet = soldOut;
  productsByCategory = groupProducts(products);

  applyRestaurantBranding(resData);
  const categories = Array.from(productsByCategory.keys());
  renderTabs(categories);
  renderSections(productsByCategory);

  document.getElementById('menuLoading').style.display = 'none';
}

// ══════════════════════════════════════════════════════════════
// Event handlers (tabs click; items+FAB+CTA se cablean en commits 4-7)
// ══════════════════════════════════════════════════════════════

document.getElementById('tabsScroll').addEventListener('click', (e) => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  const cat = tab.dataset.category;
  const section = document.querySelector(`section[data-category="${CSS.escape(cat)}"]`);
  if (section) section.scrollIntoView({ behavior: 'smooth', block: 'start' });
});

// ══════════════════════════════════════════════════════════════
// Item popup modal
// ══════════════════════════════════════════════════════════════
let modalState = { itemId: null, qty: 1, item: null };

function openItemModal(itemId) {
  const item = products.find(p => String(p.id) === String(itemId));
  if (!item) return;
  modalState = { itemId, qty: 1, item };

  document.getElementById('modalTitle').textContent = item.name;
  document.getElementById('modalPrice').textContent = fmtPrice(item.price);
  const desc = item.desc || item.description || '';
  const descEl = document.getElementById('modalDesc');
  descEl.textContent = desc;
  descEl.style.display = desc ? '' : 'none';

  // Chip con el nombre de la categoría
  const chipEl = document.getElementById('modalHeroChip');
  if (item.category) {
    chipEl.textContent = titleCase(item.category);
    chipEl.hidden = false;
  } else {
    chipEl.hidden = true;
  }

  // Hero image — si el producto tiene photo_url, mostrarlo; si no, placeholder
  const heroImg = document.getElementById('modalHeroImg');
  const heroPh = document.getElementById('modalHeroPlaceholder');
  const photoUrl = item.photo_url || item.image_url || null;
  if (photoUrl) {
    heroImg.src = photoUrl;
    heroImg.style.display = 'block';
    heroPh.style.display = 'none';
  } else {
    heroImg.style.display = 'none';
    heroPh.style.display = 'flex';
  }

  document.getElementById('modalNotes').value = '';
  document.getElementById('qtyValue').textContent = '1';
  updateModalAddTotal();

  document.getElementById('itemModalBackdrop').classList.add('open');
  document.getElementById('itemModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeItemModal() {
  document.getElementById('itemModalBackdrop').classList.remove('open');
  document.getElementById('itemModal').classList.remove('open');
  document.body.style.overflow = '';
  modalState = { itemId: null, qty: 1, item: null };
}

function updateModalAddTotal() {
  if (!modalState.item) return;
  const total = modalState.item.price * modalState.qty;
  document.getElementById('modalAddTotal').textContent = fmtPrice(total);
}

function setQty(newQty) {
  modalState.qty = Math.max(1, Math.min(99, newQty));
  document.getElementById('qtyValue').textContent = modalState.qty;
  document.getElementById('qtyMinus').disabled = modalState.qty <= 1;
  updateModalAddTotal();
}

// Listeners del modal
document.addEventListener('click', (e) => {
  const row = e.target.closest('.item-row[data-item-id]');
  if (row) {
    openItemModal(row.dataset.itemId);
  }
});
document.getElementById('modalClose').addEventListener('click', closeItemModal);
document.getElementById('modalCancel').addEventListener('click', closeItemModal);
document.getElementById('itemModalBackdrop').addEventListener('click', closeItemModal);
document.getElementById('qtyMinus').addEventListener('click', () => setQty(modalState.qty - 1));
document.getElementById('qtyPlus').addEventListener('click', () => setQty(modalState.qty + 1));
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && document.getElementById('itemModal').classList.contains('open')) {
    closeItemModal();
  }
});

document.getElementById('modalAdd').addEventListener('click', () => {
  if (!modalState.item) return;
  const notes = document.getElementById('modalNotes').value.trim();
  addToCart(modalState.item, modalState.qty, notes);
  closeItemModal();
});

// ══════════════════════════════════════════════════════════════
// Cart state + rendering
// ══════════════════════════════════════════════════════════════

function addToCart(item, qty, notes) {
  // Si el mismo item + mismas notes ya existe, sumamos qty en lugar de duplicar row
  const existing = cart.find(c => c.id === item.id && (c.notes || '') === (notes || ''));
  if (existing) {
    existing.qty = Math.min(99, existing.qty + qty);
  } else {
    cart.push({
      id: item.id,
      name: item.name,
      price: item.price,
      qty,
      notes: notes || '',
    });
  }
  updateCtaAndBadge();
  // Si el carrito está abierto, re-render
  if (document.getElementById('cartPanel').classList.contains('open')) {
    renderCart();
  }
}

function removeFromCart(idx) {
  cart.splice(idx, 1);
  updateCtaAndBadge();
  renderCart();
}

function updateCartQty(idx, delta) {
  const row = cart[idx];
  if (!row) return;
  const newQty = Math.max(1, Math.min(99, row.qty + delta));
  row.qty = newQty;
  updateCtaAndBadge();
  renderCart();
}

function cartTotal() {
  return cart.reduce((sum, r) => sum + (r.price * r.qty), 0);
}

function cartItemCount() {
  return cart.reduce((sum, r) => sum + r.qty, 0);
}

function updateCtaAndBadge() {
  const cta = document.getElementById('ctaOrder');
  const badge = document.getElementById('ctaCount');
  const count = cartItemCount();
  if (count > 0) {
    cta.hidden = false;
    badge.textContent = count;
  } else {
    cta.hidden = true;
  }
}

function renderCart() {
  const body = document.getElementById('cartBody');
  const footer = document.getElementById('cartFooter');
  const countLabel = document.getElementById('cartCountLabel');
  const count = cartItemCount();
  countLabel.textContent = count + ' ' + (count === 1 ? 'item' : 'items');

  if (!cart.length) {
    body.innerHTML = `
      <div class="cart-empty">
        <div class="cart-empty-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 2 L3 6 v14 a2 2 0 0 0 2 2 h14 a2 2 0 0 0 2 -2 V6 L18 2 Z"/>
            <path d="M3 6 h18"/>
            <path d="M16 10 a4 4 0 0 1 -8 0"/>
          </svg>
        </div>
        <div class="cart-empty-title">Tu pedido está vacío</div>
        <div class="cart-empty-msg">Explora el menú y agrega items para comenzar tu orden.</div>
      </div>
    `;
    footer.style.display = 'none';
    return;
  }

  body.innerHTML = cart.map((row, idx) => {
    const subtotal = row.price * row.qty;
    return `
      <div class="cart-item">
        <div class="cart-item-main">
          <div class="cart-item-row1">
            <span class="cart-item-name">${esc(row.name)}</span>
            <span class="cart-item-price">${fmtPrice(subtotal)}</span>
          </div>
          ${row.notes ? `<div class="cart-item-notes">${esc(row.notes)}</div>` : ''}
          <div class="cart-item-controls">
            <div class="cart-qty">
              <button onclick="updateCartQty(${idx}, -1)" aria-label="Restar">−</button>
              <span>${row.qty}</span>
              <button onclick="updateCartQty(${idx}, 1)" aria-label="Sumar">+</button>
            </div>
            <button class="cart-item-remove" onclick="removeFromCart(${idx})" aria-label="Eliminar">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M6 6 L18 18 M18 6 L6 18"/></svg>
            </button>
          </div>
        </div>
      </div>
    `;
  }).join('') + `
    <div class="cart-totals">
      <div class="cart-totals-row">
        <span class="cart-totals-label">Subtotal</span>
        <span class="cart-totals-value">${fmtPrice(cartTotal())}</span>
      </div>
      <div class="cart-totals-row">
        <span class="cart-totals-label" style="font-style:italic;">Impuestos no incluidos</span>
        <span class="cart-totals-value" style="font-size:12px;color:var(--color-text-mute);">—</span>
      </div>
      <div class="cart-totals-divider"></div>
      <div class="cart-totals-row grand">
        <span class="cart-totals-label">Total a pagar</span>
        <span class="cart-totals-value">${fmtPrice(cartTotal())}</span>
      </div>
    </div>
  `;

  document.getElementById('cartCheckoutTotal').textContent = fmtPrice(cartTotal());
  footer.style.display = '';
}

function openCart() {
  renderCart();
  document.getElementById('cartPanel').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeCart() {
  document.getElementById('cartPanel').classList.remove('open');
  document.body.style.overflow = '';
}

// Listeners
document.getElementById('cartBack').addEventListener('click', closeCart);
// Expose para onclick inline en los rows renderizados
window.updateCartQty = updateCartQty;
window.removeFromCart = removeFromCart;

document.getElementById('fabWaiter').addEventListener('click', () => {
  console.log('[thedeck] waiter FAB (chatbot wired en commit 7)');
});

document.getElementById('ctaOrder').addEventListener('click', openCart);

// Cart "Completar Orden" button — commit 6 conecta al checkout
document.getElementById('cartCheckout').addEventListener('click', () => {
  console.log('[thedeck] checkout (wired en commit 6):', cart);
});

// Kick off
init();
</script>
</body>
</html>
